version = "1.0.0rc5" 
theme = "default-bubble"   
csd = true  
send-on-ctrl-enter = false
exit-on-close = false
auto-connect = ["Libera Chat", "OFTC"]   
server-visibility = true 

log =
{
    prompt-color = true  
    prompt-file = false 
    prompt-function = true 
    prompt-line = false    
    debug-targets   = [] 
    info-targets    = []
    warn-targets    = [""]
    error-targets   = []
}

server =
{
    auto-join = []
    auto-run = []  
    user =
    {
        nickname = "bms_n"
        username = "bms_n"
        realname = "Ben Sutter"

        login:
        {
            method = "sasl-external"
            certificate = "/home/bms/.config/srain/srain.pem" 
        }

        part-message = "Leaving."
        kick-message = "Kick."
        away-message = "Away from keyboard."
        quit-message = "El Psy Congroo."
    }

    chat =
    {
        log = true  
        notify = true 
        notify-all = true  
        show-topic = true
        show-avatar = true
        show-user-list = true  
        render-mirc-color = true   
        nick-completion-suffix = ":" 
        preview-url = true
        auto-preview-url = true  
        auto-run = []  
    }
}

